spring.application.name=woundify-backend-dev
server.port=8080

# Use embedded H2 for local dev/testing (fallback) to avoid Postgres dependency
spring.datasource.url=jdbc:h2:mem:woundify_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# H2 console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# AI config (default dev)
woundify.ai.ocr-provider=gemini
woundify.ai.endpoint=http://localhost:8000
