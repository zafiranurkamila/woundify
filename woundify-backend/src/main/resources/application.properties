spring.application.name=woundify-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/woundify}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:woundify}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:woundify}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

woundify.ai.ocr-provider=${OCR_PROVIDER:gemini}
woundify.ai.endpoint=${AI_SERVICE_URL:http://ai-engine:8000}
